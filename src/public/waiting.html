<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Opening Soon — Playdarr</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .waiting-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .waiting-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      width: 100%;
      max-width: 500px;
    }
    .waiting-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .waiting-card h1 { font-size: 1.5rem; color: var(--accent); margin-bottom: 0.4rem; }
    .waiting-room-name {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    /* Open time block */
    .waiting-time-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1.25rem;
      margin-bottom: 2rem;
    }
    .waiting-time-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    .waiting-time-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    /* Segmented countdown */
    .countdown-segments {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }
    .countdown-seg {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .countdown-seg-value {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-width: 64px;
      padding: 0.6rem 0.4rem;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .countdown-seg-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .countdown-sep {
      font-size: 2rem;
      font-weight: 700;
      color: var(--border);
      align-self: flex-start;
      padding-top: 0.5rem;
      line-height: 1;
      user-select: none;
    }
    .countdown-opening {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 2rem;
      min-height: 2rem;
    }

    .waiting-redirect-note { font-size: 0.82rem; color: var(--text-muted); }
    .waiting-spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255, 194, 48, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-right: 0.4rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="waiting-page">
  <div class="waiting-card">
    <div class="waiting-icon">🎬</div>
    <h1>Room Opening Soon</h1>
    <div class="waiting-room-name" id="room-name">Loading…</div>

    <div class="waiting-time-block">
      <div class="waiting-time-label">Scheduled for</div>
      <div class="waiting-time-value" id="opens-time">…</div>
    </div>

    <div id="countdown-wrap">
      <div class="countdown-segments" id="countdown-segments">
        <div class="countdown-seg">
          <div class="countdown-seg-value" id="seg-days">—</div>
          <div class="countdown-seg-label">Days</div>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-seg">
          <div class="countdown-seg-value" id="seg-hours">—</div>
          <div class="countdown-seg-label">Hours</div>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-seg">
          <div class="countdown-seg-value" id="seg-mins">—</div>
          <div class="countdown-seg-label">Mins</div>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-seg">
          <div class="countdown-seg-value" id="seg-secs">—</div>
          <div class="countdown-seg-label">Secs</div>
        </div>
      </div>
    </div>

    <div class="countdown-opening" id="opening-msg" style="display:none">Opening now…</div>

    <div class="waiting-redirect-note">
      <span class="waiting-spinner"></span>
      You'll be redirected automatically when the room opens
    </div>
  </div>

  <script>
    'use strict';

    const token    = window.location.pathname.split('/').pop();
    const INFO_URL = '/join/' + token + '/info';

    let scheduledFor     = null;
    let countdownInterval = null;
    let pollInterval      = null;

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateSegments(ms) {
      if (ms <= 0) {
        document.getElementById('countdown-segments').style.display = 'none';
        document.getElementById('opening-msg').style.display = 'block';
        return;
      }
      const totalSecs = Math.floor(ms / 1000);
      const days    = Math.floor(totalSecs / 86400);
      const hours   = Math.floor((totalSecs % 86400) / 3600);
      const minutes = Math.floor((totalSecs % 3600) / 60);
      const seconds = totalSecs % 60;

      document.getElementById('seg-days').textContent  = pad(days);
      document.getElementById('seg-hours').textContent = pad(hours);
      document.getElementById('seg-mins').textContent  = pad(minutes);
      document.getElementById('seg-secs').textContent  = pad(seconds);
    }

    function startCountdown() {
      if (countdownInterval) clearInterval(countdownInterval);
      if (!scheduledFor) return;

      function tick() {
        const remaining = new Date(scheduledFor).getTime() - Date.now();
        updateSegments(remaining);
        if (remaining <= 0) {
          clearInterval(countdownInterval);
          countdownInterval = null;
          pollInfo();
        }
      }
      tick();
      countdownInterval = setInterval(tick, 1000);
    }

    async function pollInfo() {
      try {
        const res = await fetch(INFO_URL, { cache: 'no-store' });
        if (!res.ok) return;

        const data = await res.json();

        if (data.roomId) {
          clearInterval(pollInterval);
          clearInterval(countdownInterval);
          document.getElementById('countdown-segments').style.display = 'none';
          document.getElementById('opening-msg').style.display = 'block';
          window.location.href = '/join/' + token;
          return;
        }

        if (data.scheduled && !scheduledFor) {
          scheduledFor = data.scheduledFor;
          document.getElementById('room-name').textContent = data.name || 'Movie Night';

          const tz = data.timezone || 'UTC';
          try {
            document.getElementById('opens-time').textContent =
              new Date(data.scheduledFor).toLocaleString(undefined, {
                timeZone: tz,
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                timeZoneName: 'short'
              });
          } catch {
            document.getElementById('opens-time').textContent = data.scheduledFor;
          }

          startCountdown();
        }
      } catch {
        // Network error — silently retry
      }
    }

    pollInfo();
    pollInterval = setInterval(pollInfo, 2000);
  </script>
</body>
</html>
